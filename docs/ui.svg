<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600" role="img" aria-label="RealGoodSplits interface">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <style>
    .win{fill:#1b1f2a}.panel{fill:#242a38}.row{fill:#2c3343}.muted{fill:#8b97ad}
    .txt{fill:#e7ecf6}.lbl{fill:#aab6cd}
    text{font-family:Segoe UI,Helvetica,Arial,sans-serif}
  </style>

  <rect width="860" height="600" rx="14" class="win"/>

  <!-- header -->
  <text x="28" y="48" class="txt" font-size="24" font-weight="800">🎵 RealGoodSplits</text>
  <text x="262" y="47" class="muted" font-size="14">AI stem splitter · powered by Demucs</text>

  <!-- file panel -->
  <rect x="24" y="72" width="470" height="372" rx="10" class="panel"/>
  <rect x="40" y="88" width="92" height="30" rx="7" fill="url(#accent)"/>
  <text x="86" y="108" text-anchor="middle" fill="#06223f" font-size="13" font-weight="700">+ Add files</text>
  <rect x="140" y="88" width="78" height="30" rx="7" fill="#384154"/>
  <text x="179" y="108" text-anchor="middle" class="txt" font-size="13">+ Folder</text>
  <rect x="226" y="88" width="60" height="30" rx="7" fill="none" stroke="#4b5468"/>
  <text x="256" y="108" text-anchor="middle" class="lbl" font-size="13">Clear</text>

  <text x="40" y="142" class="muted" font-size="12">3 file(s) ready</text>
  <g font-size="13">
    <rect x="40" y="150" width="438" height="34" rx="7" class="row"/>
    <text x="54" y="172" class="txt">midnight_drive.mp3</text><text x="462" y="172" class="muted" text-anchor="end">✕</text>
    <rect x="40" y="190" width="438" height="34" rx="7" class="row"/>
    <text x="54" y="212" class="txt">acoustic_take.wav</text><text x="462" y="212" class="muted" text-anchor="end">✕</text>
    <rect x="40" y="230" width="438" height="34" rx="7" class="row"/>
    <text x="54" y="252" class="txt">live_set_full.flac</text><text x="462" y="252" class="muted" text-anchor="end">✕</text>
  </g>
  <text x="259" y="400" text-anchor="middle" class="muted" font-size="13">Drag &amp; drop audio here</text>

  <!-- settings panel -->
  <rect x="506" y="72" width="330" height="372" rx="10" class="panel"/>
  <text x="524" y="100" class="lbl" font-size="13" font-weight="700">Model</text>
  <rect x="524" y="108" width="294" height="30" rx="7" fill="#384154"/>
  <text x="536" y="128" class="txt" font-size="13">htdemucs ▾</text>

  <text x="524" y="166" class="lbl" font-size="13" font-weight="700">What to extract</text>
  <rect x="524" y="174" width="294" height="30" rx="7" fill="#2c3343"/>
  <rect x="622" y="176" width="98" height="26" rx="6" fill="url(#accent)"/>
  <text x="573" y="193" text-anchor="middle" class="lbl" font-size="12">Vocals+Inst</text>
  <text x="671" y="193" text-anchor="middle" fill="#06223f" font-size="12" font-weight="700">4 stems</text>
  <text x="769" y="193" text-anchor="middle" class="lbl" font-size="12">6 stems</text>

  <g font-size="13" class="txt">
    <rect x="524" y="214" width="15" height="15" rx="3" fill="url(#accent)"/><text x="548" y="227">Drums</text>
    <rect x="524" y="236" width="15" height="15" rx="3" fill="url(#accent)"/><text x="548" y="249">Bass</text>
    <rect x="650" y="214" width="15" height="15" rx="3" fill="url(#accent)"/><text x="674" y="227">Other</text>
    <rect x="650" y="236" width="15" height="15" rx="3" fill="url(#accent)"/><text x="674" y="249">Vocals</text>
  </g>

  <text x="524" y="288" class="lbl" font-size="13" font-weight="700">Output format</text>
  <rect x="524" y="296" width="294" height="30" rx="7" fill="#2c3343"/>
  <rect x="526" y="298" width="96" height="26" rx="6" fill="url(#accent)"/>
  <text x="574" y="315" text-anchor="middle" fill="#06223f" font-size="12" font-weight="700">wav</text>
  <text x="671" y="315" text-anchor="middle" class="lbl" font-size="12">mp3</text>
  <text x="769" y="315" text-anchor="middle" class="lbl" font-size="12">flac</text>

  <text x="524" y="356" class="lbl" font-size="13" font-weight="700">Device</text>
  <rect x="524" y="364" width="294" height="30" rx="7" fill="#384154"/>
  <text x="536" y="384" class="txt" font-size="13">auto ▾</text>
  <text x="524" y="414" class="muted" font-size="11">detected: cuda</text>

  <!-- footer: log + progress + button -->
  <rect x="24" y="456" width="660" height="96" rx="10" fill="#11141d"/>
  <g font-size="12" fill="#7fd1a8" font-family="Consolas,monospace">
    <text x="40" y="480">Starting · htdemucs · cuda</text>
    <text x="40" y="500" fill="#9fb0d0">[1/3] midnight_drive.mp3</text>
    <text x="40" y="520" fill="#7fd1a8">  ✓ midnight_drive/vocals.wav</text>
    <text x="40" y="540" fill="#7fd1a8">  ✓ midnight_drive/drums.wav</text>
  </g>

  <rect x="24" y="566" width="540" height="12" rx="6" fill="#2c3343"/>
  <rect x="24" y="566" width="320" height="12" rx="6" fill="url(#accent)"/>

  <rect x="700" y="456" width="136" height="96" rx="10" fill="url(#accent)"/>
  <text x="768" y="510" text-anchor="middle" fill="#06223f" font-size="17" font-weight="800">Split Stems</text>
</svg>
