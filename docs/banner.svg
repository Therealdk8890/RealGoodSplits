<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="RealGoodSplits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#131a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- input waveform on the left -->
  <g transform="translate(70,160)" stroke="#5b6b8c" stroke-width="3" stroke-linecap="round">
    <line x1="0" y1="-46" x2="0" y2="46"/>
    <line x1="14" y1="-70" x2="14" y2="70"/>
    <line x1="28" y1="-30" x2="28" y2="30"/>
    <line x1="42" y1="-58" x2="42" y2="58"/>
    <line x1="56" y1="-20" x2="56" y2="20"/>
    <line x1="70" y1="-80" x2="70" y2="80"/>
    <line x1="84" y1="-36" x2="84" y2="36"/>
    <line x1="98" y1="-54" x2="98" y2="54"/>
  </g>

  <!-- split arrows -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.9">
    <path d="M190 160 C 250 90, 300 80, 360 80"/>
    <path d="M190 160 C 250 140, 300 133, 360 133"/>
    <path d="M190 160 C 250 180, 300 187, 360 187"/>
    <path d="M190 160 C 250 230, 300 240, 360 240"/>
  </g>

  <!-- separated stems -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <g transform="translate(372,72)"><circle cx="-12" cy="8" r="5" fill="#f472b6"/><text x="2" y="13" fill="#e5edff">Vocals</text></g>
    <g transform="translate(372,125)"><circle cx="-12" cy="8" r="5" fill="#f59e0b"/><text x="2" y="13" fill="#e5edff">Drums</text></g>
    <g transform="translate(372,179)"><circle cx="-12" cy="8" r="5" fill="#34d399"/><text x="2" y="13" fill="#e5edff">Bass</text></g>
    <g transform="translate(372,232)"><circle cx="-12" cy="8" r="5" fill="#60a5fa"/><text x="2" y="13" fill="#e5edff">Other</text></g>
  </g>

  <!-- wordmark -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <text x="560" y="150" font-size="62" font-weight="800" fill="#ffffff">RealGood<tspan fill="url(#accent)">Splits</tspan></text>
    <text x="562" y="192" font-size="22" fill="#9fb0d0">AI stem splitter for Windows · powered by Demucs</text>
    <g transform="translate(562,222)" font-size="14" fill="#7e8db0">
      <text x="0" y="14">vocals · drums · bass · guitar · piano · instrumental</text>
    </g>
  </g>
</svg>
